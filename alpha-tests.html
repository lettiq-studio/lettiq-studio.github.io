<!DOCTYPE html>
<html lang="en" class="page-alpha-tests">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alpha Tests — Lettiq</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="site.css" />
  <link rel="icon" href="assets/favicon.ico" />
</head>
<body>

  <!-- Ambient blobs -->
  <div class="blob blob-indigo" aria-hidden="true"></div>
  <div class="blob blob-mint" aria-hidden="true"></div>

  <!-- HEADER -->
  <header>
    <div class="nav-left">
      <a href="index.html" class="nav-logo" aria-label="Lettiq home">
        <img src="./assets/appIconRounded.png" alt="Lettiq" />
      </a>
      <a href="index.html" class="nav-link" data-i18n="navHome">Home</a>
    </div>
    <div id="lang-switcher" role="group" aria-label="Language selector"></div>
  </header>

  <!-- HERO BAND -->
  <div class="hero-band">
    <div>
      <p class="hero-band-label" data-i18n="heroLabel">Closed Alpha</p>
      <h1 data-i18n="heroTitle">Alpha Tests</h1>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <main class="page-wrap" id="main-content">
    <div class="alpha-card">
      <div class="alpha-links" id="alpha-links"></div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer>
    <span class="footer-note" data-i18n="footerLeft">© 2026 Lettiq Studio</span>
    <a href="index.html" class="footer-note" data-i18n="footerHome">← Home</a>
  </footer>

  <!-- i18n -->
  <script src="i18n/alpha-tests.en.js"></script>
  <script src="i18n/alpha-tests.pl.js"></script>
  <script src="i18n/engine.js"></script>
  <script>
    function renderAlphaTests(lang) {
      const t = window.TRANSLATIONS[lang];
      if (!t) return;

      document.documentElement.lang = t.meta.htmlLang;
      document.title = t.meta.pageTitle;

      I18n.applyDataI18n(t);

      const container = document.getElementById('alpha-links');
      if (container && t.links) {
        const sortedLinks = t.links.slice().sort((a, b) => a.order - b.order);
        container.innerHTML = sortedLinks.map(link => `
          <a href="${link.url}" target="_blank" rel="noopener noreferrer" class="alpha-link">
            <span class="alpha-link-title">${link.title}</span>
            <span class="alpha-link-desc">${link.desc}</span>
          </a>
        `).join('');
      }
    }

    I18n.initI18n(renderAlphaTests);
  </script>

</body>
</html>
